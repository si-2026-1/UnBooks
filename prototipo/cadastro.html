<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — UnBooks</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <a class="logo" href="index.html"><span class="logo-mark">UB</span> UnBooks</a>
    <nav class="nav">
      <a href="index.html">Início</a>
      <a href="explorar.html">Descobrir</a>
      <a href="amigos.html">Amigos</a>
      <a href="perfil.html">Perfil</a>
      <a href="preferencias.html">Preferências</a>
      <a href="entrar.html">Entrar</a>
      <a class="cta active" href="cadastro.html">Cadastro</a>
    </nav>
  </header>

  <main>
    <section class="section">
      <form class="card form-card" action="#" data-static-action>
        <span class="kicker">Novo leitor</span>
        <h1 style="font-size:2.2rem; margin:14px 0 8px;">Criar perfil UnBooks</h1>
        <p style="margin-bottom:18px;">O cadastro inicia o questionário de preferências para personalizar recomendações.</p>
        <div class="form-row"><label>Nome</label><input type="text" placeholder="Seu nome"></div>
        <div class="form-row"><label>Matrícula</label><input type="number" placeholder="Somente números"></div>
        <div class="form-row"><label>E-mail institucional</label><input type="email" placeholder="nome@aluno.unb.br"></div>
        <div class="form-row"><label>Curso</label><select><option>Ciência da Computação</option><option>Sistemas de Informação</option><option>Engenharia de Software</option></select></div>
        <button class="btn btn-primary" type="submit">Continuar para preferências</button>
      </form>
    </section>
  </main>

  <footer class="footer"><span>UnBooks</span><span>Cadastro com foco em recomendações</span></footer>
  <script src="js/prototype.js"></script>
</body>
</html>
