<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — UnBooks</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <a class="logo" href="index.html"><span class="logo-mark">UB</span> UnBooks</a>
    <nav class="nav">
      <a href="index.html">Início</a>
      <a href="explorar.html">Descobrir</a>
      <a href="amigos.html">Amigos</a>
      <a href="perfil.html">Perfil</a>
      <a href="preferencias.html">Preferências</a>
      <a class="active" href="entrar.html">Entrar</a>
      <a class="cta" href="cadastro.html">Cadastro</a>
    </nav>
  </header>

  <main>
    <section class="section">
      <form class="card form-card" action="#" data-static-action>
        <span class="kicker">Acesso institucional</span>
        <h1 style="font-size:2.2rem; margin:14px 0 8px;">Entrar no UnBooks</h1>
        <p style="margin-bottom:18px;">Protótipo de login por matrícula institucional.</p>
        <div class="form-row"><label>Matrícula</label><input type="number" placeholder="Somente números"></div>
        <div class="form-row"><label>Senha</label><input type="password" placeholder="Sua senha"></div>
        <button class="btn btn-primary" type="submit">Entrar</button>
        <p style="margin-top:14px;">Ainda não tem conta? <a style="color:var(--primary); font-weight:900;" href="cadastro.html">Criar perfil</a></p>
      </form>
    </section>
  </main>

  <footer class="footer"><span>UnBooks</span><span>Protótipo de autenticação</span></footer>
  <script src="js/prototype.js"></script>
</body>
</html>
